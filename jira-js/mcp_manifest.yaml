name: "jira"
version: "1.2.0"
description: "Jira integration — browse issues, post comments, and transition tickets"
author: "Mastercard"
entry: "dist/index.js"
transport: stdio

allowed_domains:
  - "*.atlassian.net"
  - "api.atlassian.com"  

setup:
  - kind: info
    id: intro
    title: "Welcome to JIRA plugin setup!"
    hint: "You need a Jira account with API access enabled."

  - kind: select
    id: machine_type
    title: "Select your machine type"
    hint: "Choose \"corp\" for Mastercard corporate network or \"labs\" for Forge."
    env: MACHINE_TYPE
    options:
      - label: "Corp (Mastercard corporate network)"
        value: corp
        steps:
          - id: ensure_corp_network
            kind: ensure
            title: "Verify access to Mastercard artifacts registry"
            verify:
              - url: https://artifacts.mastercard.int
                timeout: 10
            remediate:
              - id: open_vpn_portal
                kind: open
                title: "Open VPN portal"
                url: https://10.154.18.132/connect/PortalMain
              - id: vpn_login_instructions
                kind: info
                title: "VPN login required"
                hint: "Log in to the VPN portal that just opened, then return here and retry."

      - label: "Labs (Forge)"
        value: labs
        steps:
          - id: ensure_labs_network
            kind: ensure
            title: "Verify access to Forge artifacts registry"
            verify:
              - url: https://artifacts.forge.mastercard.com
                timeout: 10
            remediate:
              - id: azure_vpn_instructions
                kind: info
                title: "Azure VPN login required"
                hint: "Open the Azure VPN app on your device and connect. Once connected, return here and press Enter to verify again."

  - kind: input
    id: base_url
    title: "Jira instance URL"
    env: JIRA_BASE_URL
    value: ""
    type: url
    required: true
    hint: "Must be the root URL, no trailing slash. https://<your-domain>.atlassian.net"

  - kind: input
    id: user_email
    title: "Your Jira account email"
    env: JIRA_USER_ID
    type: email
    required: true
    hint: "<<firstname.lastname>>@mastercard.com"

  - kind: input
    id: api_token
    title: "API Token"
    env: JIRA_API_TOKEN
    hint: "starts with 'ATLAS' and is 52 characters long"
    type: secret
    required: true
    steps:
      - kind: open
        id: open_token_page
        title: "Opening token settings page…"
        url: "https://id.atlassian.com/manage-profile/security/api-tokens"
      - kind: info
        id: token_instructions
        title: "Click \"Create token\", select Read scope, copy the value."

register:
  - vscode
  - github